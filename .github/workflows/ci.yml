name: CI — Test & Lint

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_USER: membrain
          POSTGRES_PASSWORD: password
          POSTGRES_DB: membrain_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: cd packages/backend && npx prisma generate
      - run: cd packages/backend && npx prisma db push
        env:
          DATABASE_URL: postgresql://membrain:password@localhost:5432/membrain_db
      - run: npm run test --if-present
