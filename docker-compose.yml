version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: membrain-postgres
    environment:
      POSTGRES_USER: membrain
      POSTGRES_PASSWORD: password
      POSTGRES_DB: membrain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: membrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
